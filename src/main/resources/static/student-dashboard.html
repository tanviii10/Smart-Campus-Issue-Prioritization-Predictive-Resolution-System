<!DOCTYPE html>
<html>

<head>

<title>Student Dashboard</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">
Smart Campus AI
</div>

<div class="nav-links">

<a href="#">Dashboard</a>
<a href="#" onclick="viewMyIssues()">My Issues</a>
<a href="/login.html" class="nav-login">Logout</a>

</div>

</div>



<div class="dashboard-container">


<!-- HEADER -->

<div class="dashboard-header">

<h1>Welcome Student !</h1>

<button onclick="openReport()" class="primary-btn">
Report New Issue
</button>

</div>



<!-- STATS CARDS -->

<div class="stats-container">

<div class="stat-card">

<h3>Total Issues</h3>
<p id="totalIssues">0</p>

</div>

<div class="stat-card">

<h3>Pending</h3>
<p id="pendingIssues">0</p>

</div>

<div class="stat-card">

<h3>In Progress</h3>
<p id="progressIssues">0</p>

</div>

<div class="stat-card">

<h3>Resolved</h3>
<p id="resolvedIssues">0</p>

</div>

</div>



<!-- QUICK ACTIONS -->

<div class="dashboard-actions">

<div class="action-card">

<h3>Report Issue</h3>

<p>Submit a new campus issue.</p>

<button onclick="openReport()" class="primary-btn">
Report
</button>

</div>


<div class="action-card">

<h3>Track Issues</h3>

<p>Check status of your reported issues.</p>

<button onclick="viewMyIssues()" class="secondary-btn">
View Issues
</button>

</div>

</div>



</div>



<script>

function openReport(){
window.location.href="/report-issue.html";
}

function viewMyIssues(){
window.location.href="/my-issues.html";
}


/* LOAD ISSUE STATS */

fetch("/issues/all")
.then(res => res.json())
.then(data => {

document.getElementById("totalIssues").innerText = data.length;

let pending=0;
let progress=0;
let resolved=0;

data.forEach(issue=>{

if(issue.status==="Pending") pending++;
else if(issue.status==="In Progress") progress++;
else resolved++;

});

document.getElementById("pendingIssues").innerText=pending;
document.getElementById("progressIssues").innerText=progress;
document.getElementById("resolvedIssues").innerText=resolved;

});

</script>

</body>

</html>
